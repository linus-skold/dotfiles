version = 3
final_space = true

[palette]
  # Core UI
  shell_fg             = '#d8d0c0'   # fg
  shell_bg             = '#2c2b28'   # bg_dim
  accent               = '#88a0b0'   # steel_hi
  path_fg              = '#e08060'   # coral
  root_bg              = '#c09058'   # orange
  closer               = 'p:shell_fg'

  # Git
  git_branch_fg        = '#a890a0'   # mauve_hi
  git_repo_fg          = '#ece4d4'   # fg_bright
  git_status_fg        = '#9aaa78'   # olive_hi

  # Git profile colours — add more git_profile_* entries to extend
  git_profile_personal = '#e08060'   # coral   — matched by .User name
  git_profile_work     = '#988090'   # mauve   — matched by .User.Email domain

[transient_prompt]
  template = '{{ .Shell }} 󰅂 '
  foreground = 'p:accent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'
     
  [[blocks.segments]]
    type = "os"
    style = "diamond"
    foreground = 'p:shell_fg'
    background = 'p:shell_bg'
    template = " {{ if .WSL }}WSL at {{end}}{{.Icon}} "
    leading_diamond = ""
    trailing_diamond = "" 

  [[blocks.segments]]
    template = "  "
    type = "root"
    style = "diamond"
    trailing_diamond = ""
    background = 'p:root_bg'
    foreground = "#111111"

  [[blocks.segments]]
    template = '  {{.RepoName}}  '
    foreground = 'p:git_repo_fg'
    background = 'p:accent'
    background_templates = [ "{{ if contains \"knowit\" .User.Email }}p:git_profile_work{{ end }}", "{{ if contains \"Linus\" .User}}p:git_profile_personal{{ end }}" ]
    type = 'git'
    style = 'diamond'
    trailing_diamond = ""
    [blocks.segments.properties]
     fetch_user = true 


  [[blocks.segments]]
    template = '{{ if glob ".git" }} {{else}}  {{ .Path }} {{end}}'
    foreground = 'p:path_fg'
    type = 'path'
    style = 'plain'

    [blocks.segments.properties]
      folder_icon = ''
      home_icon = '~'
      style = 'folder'

  [[blocks.segments]]
    template = ' {{ .HEAD }} '
    foreground = 'p:git_branch_fg'
    type = 'git'
    style = 'plain'

    [blocks.segments.properties]
      branch_icon = ' '
      cherry_pick_icon = ' '
      commit_icon = ' '
      fetch_status = true
      fetch_upstream_icon = false
      merge_icon = ' '
      no_commits_icon = ' '
      rebase_icon = ' '
      revert_icon = ' '
      tag_icon = ' '

  [[blocks.segments]]
    template = '{{if gt .Ahead 0 }}↑{{ .Ahead }}{{end}} {{if gt .Behind 0 }}↓{{ .Behind }}{{end}}'
    type = 'git'
    style = 'diamond'
    leading_diamond = ''
    trailing_diamond = ' '
    background = 'p:accent'

    [blocks.segments.properties]
      fetch_status = true

  [[blocks.segments]]
    template = '{{ if or .Working.Changed .Staging.Added }}{{end}} '
    foreground = 'p:git_branch_fg'
    type = 'git'
    style = 'plain'
    foreground_templates = ['{{ if .Working.Deleted }}#ff7777 {{ end }}', '{{ if or .Working.Modified .Working.Untracked }}#ffff00 {{ end }}', '{{ if or .Staging.Added .Working.Deleted }}p:git_status_fg{{ end }}']

    [blocks.segments.properties]
      fetch_status = true

  [[blocks.segments]]
    template = '󰅂'
    foreground = 'p:closer'
    type = 'text'
    style = 'plain'

[[blocks]]
  type = 'rprompt'
  alignment = 'right'
    
  [[blocks.segments]]
    template = ' {{ .FormattedMs }} '
    foreground = 'p:accent'
    type = 'executiontime'
    style = 'plain'
    [blocks.segments.properties]
      threshold = 0


  [[blocks.segments]]
    template = ' {{ .Full }} '
    foreground = 'p:git_status_fg'
    type = 'node'
    style = 'plain'

  [[blocks.segments]]
    foreground = 'p:closer'
    type = 'time'
    style = 'plain'
